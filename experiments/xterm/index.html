<!doctype html>
<html>

<head>
  <link rel="stylesheet" href="node_modules/xterm/css/xterm.css" />
      <script src="node_modules/xterm/lib/xterm.js"></script>
  <script src="node_modules/three/three.js"></script>
</head>

<body>
  <div id="terminal"></div>
  <script>
    var term = new Terminal({
  theme: {
    background: '#ff0000'
  }
});
    term.open(document.getElementById('terminal'));
    term.write('Hello from Amit Demo Text Hello from Amit Demo Text Hello from Amit Demo Text Hello from Amit Demo Text Hello from Amit Demo Text \x1B[1;3;31mxterm.js\x1B[0m $ ');
   
    var canvas = document.getElementsByTagName('canvas')[0];
    
    document.body.removeChild(document.getElementById('terminal'));
    console.log(canvas);
    var camera, scene, renderer;
    var geometry, material, mesh;

    init();
    animate();
    
    function init() {

      renderer = new THREE.WebGLRenderer();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setClearColor( 0xffffff ); 
      document.body.appendChild(renderer.domElement);

      scene = new THREE.Scene();

      camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 1, 1000);
      camera.position.z = 500;
      scene.add(camera);

      var light = new THREE.AmbientLight( 0x404040 ); // soft white light
      scene.add( light );

      texture = new THREE.Texture(canvas);
      var material = new THREE.MeshBasicMaterial({ map: texture });
      console.log(texture);
      //debugger;
      //var material = new THREE.MeshNormalMaterial();

      geometry = new THREE.BoxGeometry(200, 200, 200);
      mesh = new THREE.Mesh(geometry, material);
      scene.add(mesh);

      
    }
    function animate() {
    requestAnimationFrame(animate);
  
    //changeCanvas();
    texture.needsUpdate = true;
    mesh.rotation.y += 0.01;
    renderer.render(scene, camera);
}


    window.scene = scene;
  </script>
</body>

</html>
